<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SongSurf</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0a0a0f;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #e4e4e7;
    }

    /* ---- HEADER ---- */
    header {
      padding: 20px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(10,10,15,0.8);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .brand-name {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #ff3b6d, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logout-btn {
      padding: 8px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }

    .logout-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

    /* ---- MAIN ---- */
    main {
      max-width: 640px;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }

    /* ---- STATS ---- */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 32px;
    }

    .stat-card {
      text-align: center;
      padding: 16px 8px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
    }

    .stat-label {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ---- URL INPUT ---- */
    .input-section {
      margin-bottom: 24px;
    }

    .url-group {
      display: flex;
      gap: 10px;
    }

    .url-input {
      flex: 1;
      padding: 14px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .url-input:focus { border-color: #7c3aed; }
    .url-input::placeholder { color: rgba(255,255,255,0.25); }

    .btn {
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      color: #fff;
      box-shadow: 0 4px 16px rgba(124,58,237,0.3);
    }

    .btn-primary:hover { box-shadow: 0 6px 20px rgba(124,58,237,0.4); }

    .btn-download {
      background: linear-gradient(135deg, #ff3b6d, #7c3aed);
      color: #fff;
      box-shadow: 0 4px 16px rgba(255,59,109,0.3);
      width: 100%;
      padding: 16px;
      font-size: 15px;
    }

    .btn-download:hover { box-shadow: 0 6px 20px rgba(255,59,109,0.4); }

    .btn-sm {
      padding: 10px 18px;
      font-size: 13px;
      border-radius: 10px;
    }

    .btn-ghost {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .btn-ghost:hover { background: rgba(255,255,255,0.1); }

    .btn-danger {
      background: rgba(239,68,68,0.15);
      color: #fca5a5;
      border: 1px solid rgba(239,68,68,0.2);
    }

    .btn-danger:hover { background: rgba(239,68,68,0.25); }

    /* ---- METADATA CARD ---- */
    .metadata-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      display: none;
    }

    .metadata-card.visible { display: block; }

    .meta-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }

    .meta-thumb {
      width: 80px;
      height: 80px;
      border-radius: 10px;
      object-fit: cover;
      background: rgba(255,255,255,0.05);
    }

    .meta-info h3 {
      font-size: 16px;
      color: #fff;
      margin-bottom: 4px;
    }

    .meta-info p {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
    }

    .meta-fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }

    .meta-field label {
      display: block;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .meta-field input {
      width: 100%;
      padding: 10px 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      outline: none;
    }

    .meta-field input:focus { border-color: #7c3aed; }

    .meta-field.full { grid-column: 1 / -1; }

    /* ---- PLAYLIST CARD ---- */
    .playlist-summary {
      background: rgba(124,58,237,0.1);
      border: 1px solid rgba(124,58,237,0.2);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 13px;
      color: rgba(255,255,255,0.7);
    }

    .playlist-summary strong { color: #c4b5fd; }

    /* ---- STATUS ---- */
    .status-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      display: none;
      text-align: center;
    }

    .status-card.visible { display: block; }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }

    .spinner {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      border: 3px solid rgba(124,58,237,0.2);
      border-top-color: #7c3aed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .status-text {
      font-size: 14px;
      color: rgba(255,255,255,0.8);
      margin-bottom: 4px;
    }

    .status-detail {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
    }

    .success-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 12px;
      background: #22c55e;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #fff;
    }

    .error-box {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 10px;
      padding: 12px;
      margin-top: 12px;
      font-size: 13px;
      color: #fca5a5;
    }

    /* ---- ACTIONS BAR ---- */
    .actions-bar {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      justify-content: center;
    }

    /* ---- TABS ---- */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 28px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 4px;
    }
    .tab-btn {
      flex: 1; padding: 10px 16px; border: none; border-radius: 9px;
      background: transparent; color: rgba(255,255,255,0.45);
      font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s;
    }
    .tab-btn.active { background: rgba(124,58,237,0.25); color: #c4b5fd; border: 1px solid rgba(124,58,237,0.35); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ---- TOGGLE PLAYLIST ---- */
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      padding: 10px 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
    }
    .toggle-label {
      flex: 1;
      font-size: 13px;
      color: rgba(255,255,255,0.65);
    }
    .toggle-label strong { color: #c4b5fd; }
    .toggle-label small  { display: block; font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 2px; }
    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: rgba(255,255,255,0.1);
      border-radius: 24px;
      cursor: pointer;
      transition: background .25s;
      border: 1px solid rgba(255,255,255,0.12);
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      left: 2px; top: 2px;
      background: #fff;
      border-radius: 50%;
      transition: transform .25s;
    }
    .toggle-switch input:checked + .toggle-slider { background: #7c3aed; border-color: #7c3aed; }
    .toggle-switch input:checked + .toggle-slider::before { transform: translateX(20px); }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 500px) {
      .stats-row { grid-template-columns: repeat(3, 1fr); }
      .meta-fields { grid-template-columns: 1fr; }
      .meta-field.full { grid-column: 1; }
      .url-group { flex-direction: column; }
    }
  </style>
</head>
<body>

  <header>
    <div class="brand">
      <span style="font-size:24px">🎵</span>
      <span class="brand-name">SongSurf</span>
    </div>
    <a href="/logout" class="logout-btn">Déconnexion</a>
  </header>

  <main>
    <div class="stats-row">
      <div class="stat-card"><div class="stat-value" id="stat-artists">{{ stats.artists }}</div><div class="stat-label">Artistes</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-albums">{{ stats.albums }}</div><div class="stat-label">Albums</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-songs">{{ stats.songs }}</div><div class="stat-label">Titres</div></div>
      <div class="stat-card"><div class="stat-value" id="stat-duration">{{ stats.total_duration_formatted }}</div><div class="stat-label">Durée</div></div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" id="tab-btn-download" onclick="switchTab('download')">⬇️ Téléchargement</button>
    </div>

    <!-- ── ONGLET TÉLÉCHARGEMENT ── -->
    <div id="tab-download" class="tab-panel active">
      <div class="input-section">
        <div class="url-group">
          <input type="text" id="url-input" class="url-input" placeholder="Collez un lien YouTube Music..." autocomplete="off">
          <button id="extract-btn" class="btn btn-primary" onclick="handleExtract()">🔍 Extraire</button>
        </div>
      </div>
      <div id="metadata-card" class="metadata-card">
        <div class="meta-header">
          <img id="meta-thumb" class="meta-thumb" src="" alt="">
          <div class="meta-info">
            <h3 id="meta-title-display">—</h3>
            <p id="meta-artist-display">—</p>
          </div>
        </div>
        <div id="playlist-summary" class="playlist-summary" style="display:none">
          💿 <strong id="playlist-count">0</strong> chansons · <span id="playlist-duration">0 min</span>
        </div>
        <div class="meta-fields">
          <div class="meta-field"><label>🎤 Artiste</label><input type="text" id="meta-artist"></div>
          <div class="meta-field"><label>💿 Album</label><input type="text" id="meta-album"></div>
          <div class="meta-field"><label>🎵 Titre</label><input type="text" id="meta-title"></div>
          <div class="meta-field"><label>📅 Année</label><input type="text" id="meta-year"></div>
        </div>
        <!-- Toggle Playlist Mode -->
        <div class="toggle-row">
          <div class="toggle-label">
            <strong>🎵 Mode Playlist</strong>
            <small>Actif : dossier par album, pas de tri artiste. Inactif : tri Artist/Album/Titre.</small>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="toggle-playlist-mode" onchange="onPlaylistModeChange()">
            <span class="toggle-slider"></span>
          </label>
        </div>
        <button class="btn btn-download" id="btn-download" onclick="handleDownload()">📥 Télécharger</button>
      </div>
      <div id="status-card" class="status-card"></div>
    </div>

    <!-- ── ONGLET MÉTADONNÉES ── -->
  </main>

<script>
// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let currentMetadata     = null;
let currentUrl          = '';
let isPlaylist          = false;
let playlistData        = null;
let pollInterval        = null;
let playlistModeEnabled = false;

function onPlaylistModeChange() {
  playlistModeEnabled = document.getElementById('toggle-playlist-mode').checked;
}


// ═══════════════════════════════════════════
// TABS
// ═══════════════════════════════════════════
function switchTab(name) {
  document.getElementById('tab-download').classList.toggle('active', name === 'download');
  document.getElementById('tab-btn-download').classList.toggle('active', name === 'download');
}

// ═══════════════════════════════════════════
// API helper
// ═══════════════════════════════════════════
async function api(endpoint, method = 'GET', body = null) {
  const opts = { method, headers: {} };
  if (body) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(body); }
  const res = await fetch(endpoint, opts);
  if (res.status === 401) { window.location.href = '{{ admin_login_path }}'; return null; }
  return res.json();
}

// ═══════════════════════════════════════════
// EXTRACT / DOWNLOAD
// ═══════════════════════════════════════════
async function handleExtract() {
  const url = document.getElementById('url-input').value.trim();
  if (!url) return;
  currentUrl = url;
  const btn = document.getElementById('extract-btn');
  btn.disabled = true; btn.textContent = '⏳ Extraction...';
  hideCard('metadata-card');
  showStatus('loading', 'Extraction des métadonnées...', 'Analyse du lien YouTube Music');
  try {
    const data = await api('/api/extract', 'POST', { url });
    if (!data || !data.success) { showStatus('error', 'Extraction échouée', data?.error || 'Erreur inconnue'); return; }
    hideStatus();
    if (data.songs) {
      isPlaylist = true; playlistData = data; showPlaylistMetadata(data);
    } else if (data.title || data.artist) {
      isPlaylist = false; playlistData = null; currentMetadata = data; showSongMetadata(data);
    }
  } catch(e) { showStatus('error', 'Erreur de connexion', e.message); }
  finally { btn.disabled = false; btn.textContent = '🔍 Extraire'; }
}

function showSongMetadata(meta) {
  document.getElementById('meta-thumb').src = meta.thumbnail_url || '';
  document.getElementById('meta-thumb').style.display = meta.thumbnail_url ? 'block' : 'none';
  document.getElementById('meta-title-display').textContent  = meta.title  || '—';
  document.getElementById('meta-artist-display').textContent = meta.artist || '—';
  document.getElementById('meta-artist').value = meta.artist || '';
  document.getElementById('meta-album').value  = meta.album  || '';
  document.getElementById('meta-title').value  = meta.title  || '';
  document.getElementById('meta-year').value   = meta.year   || '';
  document.getElementById('playlist-summary').style.display = 'none';
  showCard('metadata-card');
}

function showPlaylistMetadata(data) {
  document.getElementById('meta-thumb').style.display = 'none';
  document.getElementById('meta-title-display').textContent  = data.title  || '—';
  document.getElementById('meta-artist-display').textContent = data.artist || '—';
  document.getElementById('meta-artist').value = data.artist || '';
  document.getElementById('meta-album').value  = data.title  || '';
  document.getElementById('meta-title').value  = data.title  || '';
  document.getElementById('meta-year').value   = data.year   || '';
  const dur = data.total_duration || 0;
  document.getElementById('playlist-count').textContent    = data.total_songs || 0;
  document.getElementById('playlist-duration').textContent = `${Math.floor(dur/60)} min`;
  document.getElementById('playlist-summary').style.display = 'block';
  showCard('metadata-card');
}

function _setDownloadBusy(busy) {
  const btn = document.getElementById('btn-download');
  if (!btn) return;
  btn.disabled = busy;
  btn.textContent = busy ? '⏳ En cours…' : '📥 Télécharger';
  btn.title = busy ? 'Un téléchargement est déjà en cours' : '';
}

async function handleDownload() {
  const artist = document.getElementById('meta-artist').value.trim();
  const album  = document.getElementById('meta-album').value.trim();
  const title  = document.getElementById('meta-title').value.trim();
  const year   = document.getElementById('meta-year').value.trim();
  hideCard('metadata-card');
  _setDownloadBusy(true);
  if (isPlaylist && playlistData) {
    playlistData.artist = artist; playlistData.title = album; playlistData.year = year;
    showStatus('loading', 'Ajout de la playlist à la queue...', `${playlistData.total_songs} chansons`);
    const data = await api('/api/download-playlist', 'POST', {
      url: currentUrl,
      playlist_metadata: playlistData,
      playlist_mode: playlistModeEnabled
    });
    if (data?.success) { showStatus('loading', 'Téléchargement en cours...', `${data.added} chansons dans la queue`); startPolling(); }
    else { showStatus('error', 'Erreur', data?.error || 'Erreur inconnue'); _setDownloadBusy(false); }
  } else {
    showStatus('loading', 'Téléchargement en cours...', `${artist} — ${title}`);
    const data = await api('/api/download', 'POST', {
      url: currentUrl, artist, album, title, year,
      playlist_mode: playlistModeEnabled
    });
    if (data?.success) startPolling();
    else { showStatus('error', 'Erreur', data?.error || 'Erreur inconnue'); _setDownloadBusy(false); }
  }
}

// ═══════════════════════════════════════════
// POLLING DOWNLOAD
// ═══════════════════════════════════════════
function startPolling() { stopPolling(); pollInterval = setInterval(pollStatus, 1200); pollStatus(); }
function stopPolling()  { if (pollInterval) { clearInterval(pollInterval); pollInterval = null; } }

async function pollStatus() {
  try {
    const data = await api('/api/status'); if (!data) return;
    const busy = data.in_progress || data.queue_size > 0;
    _setDownloadBusy(busy);
    if (data.in_progress && data.current_download) {
      const meta = data.current_download.metadata || {};
      const prog = data.progress || {};
      let detail = `${meta.artist || '?'} — ${meta.title || '?'}`;
      if (prog.percent > 0) detail += ` · ${prog.percent}%`;
      showStatus('loading', 'Téléchargement en cours...', detail);
    } else if (!data.in_progress && data.last_completed) {
      stopPolling();
      _setDownloadBusy(false);
      const meta = data.last_completed.metadata || {};
      showStatus('success', 'Téléchargement terminé !', `${meta.artist} — ${meta.title}`);
      refreshStats();
    } else if (data.last_error) {
      stopPolling();
      _setDownloadBusy(false);
      showStatus('error', 'Erreur', data.last_error.error);
    } else if (!data.in_progress && data.queue_size === 0) {
      stopPolling();
      _setDownloadBusy(false);
    }
  } catch(e) {}
}

// ═══════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════
function countDiffs(cur, sug) {
  return ['title','artist','track','year','genre'].filter(f =>
    (cur[f] || '') !== (sug[f] || '') && ((cur[f] || '') || (sug[f] || ''))
  ).length;
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function refreshStats() {
  try {
    const data = await api('/api/stats');
    if (data) {
      document.getElementById('stat-artists').textContent   = data.artists   || 0;
      document.getElementById('stat-albums').textContent    = data.albums    || 0;
      document.getElementById('stat-songs').textContent     = data.songs     || 0;
      document.getElementById('stat-duration').textContent  = data.total_duration_formatted || '0min';
    }
  } catch(e) {}
}

function showCard(id)   { document.getElementById(id).classList.add('visible'); }
function hideCard(id)   { document.getElementById(id).classList.remove('visible'); }
function hideStatus()   { document.getElementById('status-card').classList.remove('visible'); }

function showStatus(type, title, detail) {
  const card = document.getElementById('status-card');
  card.classList.add('visible');
  if (type === 'loading') {
    card.innerHTML = `<div class="spinner"></div><div class="status-text">${title}</div><div class="status-detail">${detail||''}</div><div class="actions-bar"><button class="btn btn-sm btn-danger" onclick="cancelDownload()">Annuler</button></div>`;
  } else if (type === 'success') {
    card.innerHTML = `<div class="success-icon">✓</div><div class="status-text">${title}</div><div class="status-detail">${detail||''}</div><div class="actions-bar"><button class="btn btn-sm btn-ghost" onclick="resetUI()">Nouveau téléchargement</button></div>`;
  } else if (type === 'error') {
    card.innerHTML = `<div style="font-size:36px;margin-bottom:12px">❌</div><div class="status-text">${title}</div><div class="error-box">${detail||''}</div><div class="actions-bar"><button class="btn btn-sm btn-ghost" onclick="resetUI()">Réessayer</button></div>`;
  }
}

function resetUI() {
  hideStatus(); hideCard('metadata-card');
  document.getElementById('url-input').value = '';
  document.getElementById('url-input').focus();
  currentMetadata = null; playlistData = null; isPlaylist = false; stopPolling();
}

async function cancelDownload() {
  await api('/api/cancel', 'POST'); stopPolling();
  showStatus('error', 'Téléchargement annulé', '');
}


// ═══════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════
document.getElementById('url-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleExtract();
});

(async () => {
  const data = await api('/api/status');
  if (!data) return;
  if (data.in_progress || data.queue_size > 0) {
    _setDownloadBusy(true);
    startPolling();
  }
})();

// Charger la section playlists si on commence sur l'onglet métadonnées
// (sinon switchTab('metadata') s'en chargera)
refreshStats();
</script>
</body>
