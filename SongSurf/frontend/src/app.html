<!doctype html>
<html lang="fr">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<script>try{if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark')}catch{}</script>
	<!-- Geist (texte courant) via Bunny Fonts — uniformisé avec auth. JGS reste pour les titres. -->
	<link rel="preconnect" href="https://fonts.bunny.net" />
	<link href="https://fonts.bunny.net/css?family=geist:400,500,600,700|geist-mono:400,500" rel="stylesheet" />
	%sveltekit.head%
</head>
<body data-sveltekit-preload-data="off">
	<div>%sveltekit.body%</div>
</body>
</html>
