# ============================================
# SongSurf - Docker Compose
# ============================================
#
# Dashboard web de téléchargement musical
#
# Utilisation:
#   docker-compose up -d           # Démarrer
#   docker-compose logs -f         # Logs
#   docker-compose down            # Arrêter
#
# IMPORTANT:
#   Changez SONGSURF_PASSWORD avant de déployer !

services:
  songsurf:
    container_name: songsurf
    build:
      context: .
      dockerfile: Dockerfile
    image: songsurf:latest
    restart: on-failure

    # Utilise directement le réseau du NAS (résout les problèmes DNS Synology)
    network_mode: host

    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Paris
      # Mot de passe du dashboard (OBLIGATOIRE en production)
      - SONGSURF_PASSWORD=ChangezMoiAvantDeDéployer
      # Clé secrète Flask pour les sessions
      - FLASK_SECRET_KEY=ChangezMoiAussi
      - SONGSURF_GUEST_PASSWORD=MotDePasseAmis    # ← nouveau
      - GUEST_MAX_SONGS=10                         # ← nouveau
      - GUEST_SESSION_TTL=3600                     # ← nouveau
      - PLEX_MUSIC_DIR=/data/plex_music            # ← dossier Plex destination
      - ADMIN_LOGIN_PATH=/administrator            # ← URL secrète du login admin

    volumes:
      - ./data/temp:/data/temp
      - ./data/music:/data/music
      - ./data/music_guest:/data/music_guest
      - ./data/temp_guest:/data/temp_guest
      - ./logs:/app/logs
      - ./python-server/templates:/app/templates
      # Dossier Plex destination (déplacement après validation des métadonnées)
      - /volume1/plex_media/music:/data/plex_music

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
