# ============================================
# SongSurf - Docker Compose
# ============================================
#
# Architecture :
#   [Watcher :8080]  ← toujours actif, gère l'auth et proxyfie
#        │
#        └── démarre/arrête à la demande →  [SongSurf :8081 interne]
#
# Les deux services utilisent network_mode: host (résout les problèmes DNS Synology).
# Watcher atteint SongSurf via http://localhost:8081 (réseau hôte partagé).
# Seul le port 8080 (Watcher) doit être accessible depuis l'extérieur.
#
# Utilisation:
#   docker-compose up -d           # Démarrer (Watcher + SongSurf)
#   docker-compose logs -f         # Logs
#   docker-compose down            # Arrêter
#
# IMPORTANT :
#   Changez WATCHER_PASSWORD, FLASK_SECRET_KEY et WATCHER_SECRET
#   avant de déployer en production !

services:

  # ── Watcher : portail d'auth, toujours actif (~15 MB RAM) ───────────────
  watcher:
    container_name: watcher
    build:
      context: .
      dockerfile: watcher/Dockerfile
    image: watcher:latest
    restart: on-failure
    network_mode: host
    user: root    # Nécessaire pour accéder au Docker socket (/var/run/docker.sock)

    volumes:
      # Accès au Docker socket pour démarrer/arrêter SongSurf
      - /var/run/docker.sock:/var/run/docker.sock

    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Paris
      # Clé secrète Flask pour les sessions Watcher
      # - FLASK_SECRET_KEY=ChangezMoiAussi-Watcher
      # # Mot de passe du dashboard admin
      # - WATCHER_PASSWORD=ChangezMoiAvantDeDéployer
      # # Mot de passe accès guest
      # - WATCHER_GUEST_PASSWORD=MotDePasseAmis
      # # Secret partagé Watcher ↔ SongSurf (doit être identique des deux côtés)
      # - WATCHER_SECRET=GenerezUnSecretAleatoire
      # URL secrète du login admin
      - ADMIN_LOGIN_PATH=/administrator
      # Nom du container SongSurf (doit correspondre à container_name ci-dessous)
      - TARGET_CONTAINER=songsurf
      # SongSurf écoute sur localhost:8081 (réseau hôte)
      - TARGET_URL=http://localhost:8081
      # Arrêter SongSurf après 30 min d'inactivité
      - INACTIVITY_TIMEOUT=1800

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/ping')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── SongSurf : application principale, démarrée à la demande ────────────
  songsurf:
    container_name: songsurf
    build:
      context: .
      dockerfile: Dockerfile
    image: songsurf:latest
    restart: on-failure
    network_mode: host

    environment:
      - PYTHONUNBUFFERED=1
      - TZ=Europe/Paris
      # SongSurf écoute sur le port 8081 (Watcher prend le 8080)
      - FLASK_PORT=8081
      # # Clé secrète Flask (différente de celle du Watcher)
      - FLASK_SECRET_KEY=ChangezMoiAussi-SongSurf
      # Secret partagé Watcher ↔ SongSurf (doit être identique des deux côtés)
      - WATCHER_SECRET=GenerezUnSecretAleatoire
      # URL du login admin (fallback mode standalone uniquement)
      - ADMIN_LOGIN_PATH=/administrator
      # Ces mots de passe ne sont plus utilisés en mode Watcher
      # (gardés pour mode standalone/dev local uniquement)
      - SONGSURF_PASSWORD=
      - SONGSURF_GUEST_PASSWORD=
      # Quota et durée de session guest (0 = illimité)
      - GUEST_MAX_SONGS=0
      - GUEST_SESSION_TTL=3600

    volumes:
      - ./static:/app/static
      - ./data/temp:/data/temp
      - ./data/music:/data/music
      - ./data/music_guest:/data/music_guest
      - ./data/temp_guest:/data/temp_guest
      - ./logs:/app/logs
      - ./server/templates:/app/templates

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
