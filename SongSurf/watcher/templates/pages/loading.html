<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SongSurf — Démarrage…</title>
  {% if retries < 10 %}
  <meta http-equiv="refresh" content="3;url={{ next_url }}?_r={{ retries + 1 }}">
  {% endif %}
  <style>
    body { margin: 0; background: #0a0a0f; color: #f5f7ff; font-family: sans-serif;
           display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .box { text-align: center; }
    .spinner { width: 48px; height: 48px; border: 4px solid rgba(255,255,255,.15);
               border-top-color: #7c3aed; border-radius: 50%;
               animation: spin .9s linear infinite; margin: 0 auto 24px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 { font-size: 22px; margin: 0 0 8px; }
    p  { color: #a8acc4; font-size: 14px; margin: 0; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <h1>🎵 SongSurf</h1>
    <p>Démarrage en cours, une seconde…</p>
  </div>
</body>
</html>
