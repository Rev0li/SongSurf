<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SongSurf - Démarrage...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #fff;
    }

    .card {
      text-align: center;
      padding: 48px 40px;
      background: linear-gradient(135deg, rgba(30,30,50,0.9), rgba(15,15,25,0.95));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      width: 100%;
      max-width: 380px;
    }

    .logo { font-size: 52px; margin-bottom: 12px; }

    .title {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, #ff3b6d, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      margin-bottom: 36px;
    }

    /* Spinner animé */
    .spinner-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
    }
    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(255,255,255,0.08);
      border-top: 3px solid #7c3aed;
      border-right: 3px solid #ff3b6d;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Dots de progression */
    .dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 20px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.12);
      transition: background 0.4s;
    }
    .dot.active { background: #7c3aed; }

    .status-msg {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      min-height: 18px;
      transition: opacity 0.3s;
    }

    .tip {
      margin-top: 28px;
      padding: 12px 14px;
      background: rgba(124,58,237,0.08);
      border: 1px solid rgba(124,58,237,0.15);
      border-radius: 10px;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🎵</div>
    <div class="title">SongSurf</div>
    <div class="subtitle">Démarrage du serveur en cours…</div>

    <div class="spinner-wrap">
      <div class="spinner"></div>
    </div>

    <div class="dots">
      <div class="dot active" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
    </div>

    <div class="status-msg" id="status">Lancement de SongSurf…</div>

    <div class="tip">
      ⚡ Le serveur est démarré à la demande pour économiser les ressources.<br>
      Cela prend généralement moins de 10 secondes.
    </div>
  </div>

  <script>
    const NEXT = '{{ next_url }}';
    const MSGS = [
      'Lancement de SongSurf…',
      'Initialisation en cours…',
      'Encore quelques secondes…',
      'Presque prêt…',
      'Démarrage plus long que prévu…',
    ];

    let attempts = 0;
    let dotIdx   = 0;

    // Rotation des dots de progression
    setInterval(() => {
      document.getElementById(`d${dotIdx}`).classList.remove('active');
      dotIdx = (dotIdx + 1) % 3;
      document.getElementById(`d${dotIdx}`).classList.add('active');
    }, 600);

    function poll() {
      fetch('/watcher/ready')
        .then(r => r.json())
        .then(data => {
          if (data.ready) {
            document.getElementById('status').textContent = '✅ Prêt — redirection…';
            window.location.href = NEXT;
          } else {
            attempts++;
            const msgIdx = Math.min(Math.floor(attempts / 3), MSGS.length - 1);
            document.getElementById('status').textContent = MSGS[msgIdx];
            setTimeout(poll, 2000);
          }
        })
        .catch(() => setTimeout(poll, 2000));
    }

    // Première vérification après 1.5s
    setTimeout(poll, 1500);
  </script>
</body>
</html>
