<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SongSurf — Service indisponible</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .card {
      width: 100%;
      max-width: 420px;
      padding: 40px 36px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(30,30,50,0.9), rgba(15,15,25,0.95));
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      text-align: center;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    .title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 10px;
      color: #fff;
    }
    .subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.55);
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .code {
      display: inline-block;
      background: rgba(255,255,255,0.08);
      border-radius: 6px;
      padding: 2px 8px;
      font-family: monospace;
      font-size: 13px;
      color: #ffd48f;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔒</div>
    <h1 class="title">Service non disponible</h1>
    <p class="subtitle">
      L'authentification n'est pas configurée.<br>
      Contactez l'administrateur ou activez
      <span class="code">DEV_MODE=true</span>
      pour le développement.
    </p>
    <p class="subtitle" style="font-size:12px;margin-bottom:0">
      HTTP 503 — Phase 2 locked
    </p>
  </div>
</body>
</html>
