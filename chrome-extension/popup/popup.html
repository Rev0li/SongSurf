<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SongSurf Clip</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111827;
      color: #f3f4f6;
      font-size: 13px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px;
      border-bottom: 1px solid rgba(255,255,255,.08);
    }
    .logo { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -.01em; }
    .logo span { color: #60a5fa; }

    /* ── Status pill ── */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .03em;
    }
    .status-pill .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-pill.online  { background: rgba(52,211,153,.15); color: #34d399; }
    .status-pill.online  .dot { background: #34d399; }
    .status-pill.offline { background: rgba(248,113,113,.15); color: #f87171; }
    .status-pill.offline .dot { background: #f87171; animation: pulse 1.2s infinite; }
    .status-pill.unknown { background: rgba(156,163,175,.12); color: #9ca3af; }
    .status-pill.unknown .dot { background: #9ca3af; }

    @keyframes pulse {
      0%, 100% { opacity: 1; } 50% { opacity: .35; }
    }

    /* ── Body ── */
    .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }

    .info-row {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #9ca3af;
      font-size: 12px;
      line-height: 1.4;
    }
    .info-row .icon { font-size: 16px; flex-shrink: 0; }

    #offline-hint {
      background: rgba(248,113,113,.1);
      border: 1px solid rgba(248,113,113,.25);
      border-radius: 8px;
      padding: 8px 12px;
      color: #fca5a5;
      font-size: 11px;
      line-height: 1.5;
      display: none;
    }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 9px 14px;
      border-radius: 8px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary {
      background: #2563eb;
      color: #fff;
    }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { background: #374151; color: #6b7280; cursor: not-allowed; transform: none; }
    .btn-ghost {
      background: rgba(255,255,255,.06);
      color: #d1d5db;
      border: 1px solid rgba(255,255,255,.1);
    }
    .btn-ghost:hover { background: rgba(255,255,255,.1); }

    /* ── Footer ── */
    .footer {
      padding: 8px 16px 12px;
      display: flex;
      gap: 8px;
    }

    #no-config {
      padding: 14px 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #no-config p { color: #9ca3af; line-height: 1.5; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">Song<span>Surf</span> Clip</div>
    <div class="status-pill unknown" id="status-pill">
      <div class="dot"></div>
      <span id="status-text">…</span>
    </div>
  </div>

  <!-- Not configured -->
  <div id="no-config" style="display:none">
    <p>Configure l'URL de SongSurf dans les options pour commencer.</p>
    <button class="btn btn-primary" id="btn-open-options">⚙️ Ouvrir les options</button>
  </div>

  <!-- Configured -->
  <div id="main" style="display:none">
    <div class="body">
      <div class="info-row">
        <span class="icon">🎵</span>
        <span>Navigue sur YouTube Music et clique <strong>+ SongSurf</strong> sur une chanson, un album ou une playlist.</span>
      </div>

      <div id="offline-hint">
        SongSurf est hors ligne. Le Watcher va le redémarrer automatiquement lors de ta prochaine visite.
      </div>
    </div>

    <div class="footer">
      <button class="btn btn-primary" id="btn-open-songsurf" style="flex:1">
        ↗ Ouvrir SongSurf
      </button>
      <button class="btn btn-ghost" id="btn-options" title="Options" style="width:40px;flex-shrink:0">
        ⚙️
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
